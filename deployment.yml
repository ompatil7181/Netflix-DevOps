apiVersion: apps/v1
kind: Deployment

metadata:
  name: netflix-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: netflix

  template:
    metadata:
      labels:
        app: netflix

    spec:
      containers:
      - name: netflix
        image: omkarpatil19/netflix:latest

        ports:
        - containerPort: 80